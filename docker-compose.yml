services:

  # ── Nginx — public entry point ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    restart: unless-stopped

  # ── Frontend (web app + SQLite) ──────────────────────────────────
  frontend:
    build: .
    expose:
      - "8080"
    environment:
      PORT: "8080"
      DB_PATH: "/data/snakedex.db"
      SEARCH_SERVICE_URL: "http://search-service:8081"
      DETAIL_SERVICE_URL: "http://detail-service:8082"
    volumes:
      - snakedex-data:/data
    depends_on:
      search-service:
        condition: service_healthy
      detail-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Search service ───────────────────────────────────────────────
  search-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        CMD: cmd/search-service
    expose:
      - "8081"
    environment:
      PORT: "8081"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Detail service ───────────────────────────────────────────────
  detail-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        CMD: cmd/detail-service
    expose:
      - "8082"
    environment:
      PORT: "8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

volumes:
  snakedex-data:
