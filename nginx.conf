events {}

http {
  # Rate limiting — 10 req/s par IP
  limit_req_zone $binary_remote_addr zone=default:10m rate=10r/s;

  upstream frontend   { server frontend:8080; }
  upstream search_svc { server search-service:8081; }
  upstream detail_svc { server detail-service:8082; }

  server {
    listen 80;

    # Public web app
    location / {
      limit_req zone=default burst=20 nodelay;
      proxy_pass         http://frontend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Internal JSON APIs (direct access, useful during dev / for other services)
    location /api/search {
      rewrite ^/api/search(.*)$ /search$1 break;
      proxy_pass http://search_svc;
    }

    location /api/taxa/ {
      rewrite ^/api/taxa/(.*)$ /taxa/$1 break;
      proxy_pass http://detail_svc;
    }

    # Block /metrics from the public
    location /metrics { return 403; }
  }
}
